
services:
  crud_webapi:
     build:
       context: ..
       dockerfile: WebApi/Dockerfile
     ports:
       - "8080:8080"
     container_name: notes_web_api
     depends_on:
       - db
  db:
    image: postgres:latest
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    volumes:
      - db_data:/var/lib/postgresql/data
    container_name: db_postgressql_container
volumes:
  db_data: